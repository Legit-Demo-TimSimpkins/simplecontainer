name: Docker Build and Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build the Docker image locally
      - name: Build Docker image
        run: docker build -t my-test-app:${{ github.sha }} .

      # 2. Run a vulnerability scan (using Trivy as an example)
      # Legit Security often ingests results from scanners like this
      - name: Run Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-test-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # This fails the build if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 3. Log into GitHub Container Registry (Optional)
      # - name: Log in to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
